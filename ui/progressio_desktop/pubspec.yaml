name: progressio_desktop
description: "Progressio Admin Panel - Flutter Windows Desktop"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.4.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  http: ^1.4.0
  provider: ^6.1.5
  json_annotation: ^4.9.0
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.0.0
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.8.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true