name: progressio_mobile
description: "Progressio Mobile - Flutter Android Client"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.4.0
  provider: ^6.1.5
  cached_network_image: ^3.4.1
  fl_chart: ^1.2.0
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  share_plus: ^10.1.4
  table_calendar: ^3.1.3
  flutter_stripe: ^11.0.0   # Stripe SDK — Payment Sheet
  path_provider: ^2.1.4     # Used for export file saving

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true