services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-CU24-ubuntu-22.04
    container_name: progressio_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "${SQLSERVER_PORT}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: progressio_rabbitmq
    ports:
      - "${RABBITMQ_AMQP_PORT}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_USER}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASS}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Progressio.WebApi/Dockerfile
    container_name: progressio_api
    ports:
      - "${API_PORT}:8080"
    environment:
      ConnectionStrings__Default: "Server=${DOCKER_DB_HOST},1433;Database=${DB_NAME};User Id=sa;Password=${DB_PASSWORD};MultipleActiveResultSets=true;TrustServerCertificate=True"
      Jwt__Key: "${JWT_KEY}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      RabbitMq__Host: "${DOCKER_RABBITMQ_HOST}"
      RabbitMq__Username: "${RABBITMQ_USER}"
      RabbitMq__Password: "${RABBITMQ_PASS}"
      RabbitMq__Port: "${DOCKER_RABBITMQ_PORT}"
      Stripe__PublishableKey: "${STRIPE_PUBLISHABLE_KEY}"
      Stripe__SecretKey: "${STRIPE_SECRET_KEY}"
      Stripe__WebhookSecret: "${STRIPE_WEBHOOK_SECRET}"
      Api__InternalKey: "${INTERNAL_KEY}"
      Security__TokenHashKey: "${TOKEN_HASH_KEY}"
      Stats__AvgMinutesPerChapter: "${STATS_AVG_MINUTES_PER_CHAPTER}"
      Stats__AvgHoursPerGame: "${STATS_AVG_HOURS_PER_GAME}"
      Cors__AllowedOrigins: "${CORS_ALLOWED_ORIGINS}"
      Storage__WebRootPath: "${STORAGE_WEB_ROOT_PATH}"
      Storage__ProfileUploadPath: "${STORAGE_PROFILE_UPLOAD_PATH}"
      DataProtection__KeysPath: "${DATA_PROTECTION_KEYS_PATH}"
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT}"
      AllowedHosts: "${ALLOWED_HOSTS}"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - dataprotection_keys:/app/.keys
      - profile_uploads:/app/wwwroot/uploads

  worker:
    build:
      context: .
      dockerfile: Progressio.Worker/Dockerfile
    container_name: progressio_worker
    environment:
      ConnectionStrings__Default: "Server=${DOCKER_DB_HOST},1433;Database=${DB_NAME};User Id=sa;Password=${DB_PASSWORD};MultipleActiveResultSets=true;TrustServerCertificate=True"
      RabbitMq__Host: "${DOCKER_RABBITMQ_HOST}"
      RabbitMq__Username: "${RABBITMQ_USER}"
      RabbitMq__Password: "${RABBITMQ_PASS}"
      RabbitMq__Port: "${DOCKER_RABBITMQ_PORT}"
      Api__BaseUrl: "${DOCKER_API_BASE_URL}"
      Api__InternalKey: "${INTERNAL_KEY}"
      Smtp__Host: "${SMTP_HOST}"
      Smtp__Port: "${SMTP_PORT}"
      Smtp__Username: "${SMTP_USERNAME}"
      Smtp__Password: "${SMTP_PASSWORD}"
      Smtp__FromEmail: "${SMTP_FROM_EMAIL}"
      Smtp__FromName: "${SMTP_FROM_NAME}"
      Smtp__UseSsl: "${SMTP_USE_SSL}"
      DOTNET_ENVIRONMENT: "${DOTNET_ENVIRONMENT}"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started

volumes:
  sqlserver_data:
  rabbitmq_data:
  dataprotection_keys:
  profile_uploads:
